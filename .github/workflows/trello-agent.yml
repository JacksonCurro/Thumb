name: Trello Agent

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: "Trello card ID"
        required: true
      card_name:
        description: "Trello card name"
        required: true
      spec:
        description: "Task spec from Trello card description"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create branch
        run: |
          git config user.name "Trello Agent"
          git config user.email "agent@trello-orchestrator.dev"
          git checkout -b "feature/trello-${{ github.event.inputs.card_id }}"

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You have a task from Trello card \"${{ github.event.inputs.card_name }}\".

          ## Task Spec
          ${{ github.event.inputs.spec }}

          ## Rules
          - You may only create or modify files inside /src, /app, and /components.
          - You must NEVER touch: .env*, next.config*, .github/, vercel.json, or deployment configs.
          - Write clean, readable TypeScript following existing codebase patterns.
          - Do not install new dependencies unless absolutely necessary.
          - Stage and commit your changes with a clear, descriptive message.
          - Do NOT push or create a PR — that is handled separately." \
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash(git add:*),Bash(git commit:*)"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet main; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes were made by Claude Code"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch
        if: steps.changes.outputs.has_changes == 'true'
        run: git push origin "feature/trello-${{ github.event.inputs.card_id }}"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARD_ID: ${{ github.event.inputs.card_id }}
          CARD_NAME: ${{ github.event.inputs.card_name }}
          SPEC: ${{ github.event.inputs.spec }}
        run: |
          cat > /tmp/pr-body.md <<EOF
          ## Trello Card
          **Card:** ${CARD_NAME}
          **ID:** \`${CARD_ID}\`

          ## Spec
          ${SPEC}

          ---
          *Generated by Trello Agent Orchestrator using Claude Code*
          EOF
          gh pr create \
            --title "[trello-${CARD_ID}] ${CARD_NAME}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "feature/trello-${CARD_ID}"
