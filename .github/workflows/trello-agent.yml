name: Trello Agent

on:
  workflow_dispatch:
    inputs:
      card_id:
        description: "Trello card ID"
        required: true
      card_name:
        description: "Trello card name"
        required: true
      spec:
        description: "Task spec from Trello card description"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create branch
        run: |
          git config user.name "Trello Agent"
          git config user.email "agent@trello-orchestrator.dev"
          git checkout -b "feature/trello-${{ github.event.inputs.card_id }}"

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            --allowedTools "Edit,Write,Read,Glob,Grep,Bash(git add:*),Bash(git commit:*)" \
            --message "You have a task from Trello card \"${{ github.event.inputs.card_name }}\".

          ## Task Spec
          ${{ github.event.inputs.spec }}

          ## Rules
          - You may only create or modify files inside /src, /app, and /components.
          - You must NEVER touch: .env*, next.config*, .github/, vercel.json, or deployment configs.
          - Write clean, readable TypeScript following existing codebase patterns.
          - Do not install new dependencies unless absolutely necessary.
          - Stage and commit your changes with a clear, descriptive message.
          - Do NOT push or create a PR — that is handled separately."

      - name: Push branch
        run: git push origin "feature/trello-${{ github.event.inputs.card_id }}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[trello-${{ github.event.inputs.card_id }}] ${{ github.event.inputs.card_name }}" \
            --body "## Trello Card
          **Card:** ${{ github.event.inputs.card_name }}
          **ID:** \`${{ github.event.inputs.card_id }}\`

          ## Spec
          ${{ github.event.inputs.spec }}

          ---
          *Generated by Trello Agent Orchestrator using Claude Code*" \
            --base main \
            --head "feature/trello-${{ github.event.inputs.card_id }}"
